<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genius Agency — Landings</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="brand">Genius<span>.</span></a>
    <span class="header-meta">Panel interno — Landings por cliente</span>
  </header>

  <main>
    <div class="page-header">
      <h1>Clientes</h1>
      <p>Seleccioná un cliente para ver y gestionar sus landing pages.</p>
    </div>

    <div id="status-msg" style="color:#64748b;font-size:.9rem;">Cargando clientes desde APIs...</div>
    <div id="client-grid" class="client-grid" style="display:none;"></div>
  </main>

  <footer class="site-footer">
    Genius Agency &mdash; Uso interno. No compartir fuera del equipo.
  </footer>

  <script>
    const BUDGET_API_URL = 'http://localhost:8080/api/campaigns';
    const CRM_API_URL = 'http://localhost:3000/api/landings';

    function normalize(value) {
      return (value || '')
        .toString()
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, ' ');
    }

    function inferFolder(clientName) {
      return normalize(clientName).replace(/\s+/g, '-');
    }

    function displayClientName(clientName) {
      const key = normalize(clientName);
      const aliases = {
        'suenosimple': 'SueñoSimple',
        'techstore': 'TechStore',
        'modalatam': 'ModaLatam'
      };
      return aliases[key] || clientName;
    }

    function initials(clientName) {
      const parts = (clientName || '').split(/\s+/).filter(Boolean);
      if (parts.length === 0) return 'CL';
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function renderClients(catalog) {
      const grid = document.getElementById('client-grid');
      const status = document.getElementById('status-msg');

      if (catalog.length === 0) {
        status.textContent = 'No hay clientes disponibles desde las APIs.';
        return;
      }

      const cards = catalog.map(client => {
        const folder = inferFolder(client.name);
        const landingText = `${client.landings} landing${client.landings === 1 ? '' : 's'}`;
        const campaignText = `${client.campaigns} campaña${client.campaigns === 1 ? '' : 's'}`;
        return `
          <div class="client-card">
            <div class="client-card-top">
              <div class="client-avatar av-blue">${initials(client.name)}</div>
              <span class="client-industry">Desde APIs</span>
            </div>
            <h2>${client.name}</h2>
            <p>Datos sincronizados desde Budget Manager y Landing CRM.</p>
            <span class="client-stat">${landingText} · ${campaignText}</span>
            <br>
            <a href="${folder}/index.html" class="btn btn-primary">Ver landings</a>
          </div>
        `;
      }).join('');

      grid.innerHTML = cards;
      status.style.display = 'none';
      grid.style.display = 'grid';
    }

    async function loadClients() {
      const status = document.getElementById('status-msg');
      try {
        const [campaignsReq, landingsReq] = await Promise.allSettled([
          fetch(BUDGET_API_URL),
          fetch(CRM_API_URL)
        ]);

        let campaigns = [];
        let landings = [];
        const warnings = [];

        if (campaignsReq.status === 'fulfilled' && campaignsReq.value.ok) {
          campaigns = await campaignsReq.value.json();
        }

        if (landingsReq.status === 'fulfilled' && landingsReq.value.ok) {
          landings = await landingsReq.value.json();
        } else {
          warnings.push('Landing CRM no disponible desde esta página.');
        }

        if (campaigns.length === 0 && landings.length === 0) {
          throw new Error('No se pudo consultar ninguna API.');
        }

        const map = new Map();

        campaigns.forEach(item => {
          const name = (item.client || '').trim();
          const key = normalize(name);
          if (!key) return;
          if (!map.has(key)) map.set(key, { name: displayClientName(name), landings: 0, campaigns: 0 });
          map.get(key).campaigns += 1;
        });

        landings.forEach(item => {
          const name = (item.client || '').trim();
          const key = normalize(name);
          if (!key) return;
          if (!map.has(key)) map.set(key, { name: displayClientName(name), landings: 0, campaigns: 0 });
          map.get(key).landings += 1;
        });

        const catalog = Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name));
        renderClients(catalog);

        if (warnings.length > 0) {
          status.style.display = 'block';
          status.style.color = '#92400e';
          status.textContent = warnings.join(' ');
        }
      } catch (error) {
        status.style.color = '#dc2626';
        status.textContent = `Error al cargar datos desde APIs: ${error.message}`;
      }
    }

    loadClients();
  </script>

</body>
</html>
