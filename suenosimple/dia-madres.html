<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Día de las Madres — SueñoSimple</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #0f172a;
    }

    .back-bar {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 32px;
      font-size: 0.82rem;
    }

    .back-bar a { color: #2563eb; text-decoration: none; }
    .back-bar a:hover { text-decoration: underline; }

    .hero {
      background: #0f172a;
      color: #fff;
      text-align: center;
      padding: 80px 24px;
    }

    .hero .badge-tag {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 2.8rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -0.03em;
    }

    .hero h1 span { color: #60a5fa; }

    .hero p {
      font-size: 1.1rem;
      color: #94a3b8;
      max-width: 560px;
      margin: 0 auto 32px;
      line-height: 1.65;
    }

    .btn-hero-primary {
      background: #2563eb;
      color: #fff;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-hero-primary:hover { background: #1d4ed8; }

    .footer {
      background: #0f172a;
      color: #64748b;
      text-align: center;
      padding: 28px 24px;
      font-size: 0.82rem;
    }

    .footer a { color: #94a3b8; text-decoration: none; }
  </style>
</head>
<body>

  <div class="back-bar">
    <a href="index.html">← Volver a SueñoSimple</a>
  </div>

  <section class="hero">
    <span class="badge-tag">Día de las Madres</span>
    <p><!-- TODO: agregar descripción de la campaña --></p>
    <a href="#" class="btn-hero-primary">Ver promoción</a>
  </section>

  <footer class="footer">
    &copy; 2026 SueñoSimple. Todos los derechos reservados. &mdash;
    <a href="#">Política de privacidad</a>
  </footer>

</body>
</html>
